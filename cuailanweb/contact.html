<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>
    <link rel="stylesheet" href="contact.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="icon" type="image/png" href="assets/profile.jpg" />
  </head>

  <body>
    <header>
      <div class="logo">
        <img src="assets/profile.jpg" alt="BodyForge Logo" />
        <h2>My contacts</h2>
      </div>

      <nav>
        <ul>
          <li><a href="index.html" class="nav-btn-style">Home</a></li>
          <li>
            <a href="worksout.html" class="nav-btn-style">Skills/Hobbies</a>
          </li>
          <li>
            <a href="contact.html" class="nav-btn-style active">Contact</a>
          </li>
        </ul>
      </nav>
    </header>

    <section class="programs">
      <h2>Contacts</h2>
      <p class="subtitle">The Creator</p>
      <div class="program-grid">
        <div class="team-card">
          <i class="fas fa-user-circle team-icon"></i>
          <h3>Joao Paulo Cauilan</h3>
          <p class="team-role">Handsome</p>
          <div class="team-socials">
            <a href="#" aria-label="Facebook"
              ><i class="fab fa-facebook-f"></i
            ></a>
            <a href="#" aria-label="LinkedIn"
              ><i class="fab fa-linkedin"></i
            ></a>
            <a href="#" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
          </div>
        </div>
      </div>
    </section>
    <section class="about" style="padding-top: 0px">
      <h2>Get In Touch</h2>
      <p class="subtitle">Have a question? We'd love to hear from you.</p>

      <div class="form-container">
        <form action="#" method="POST" class="contact-form">
          <div class="form-group">
            <input type="text" name="name" placeholder="Your Name" required />
          </div>
          <div class="form-group">
            <input
              type="email"
              name="email"
              placeholder="Your Email"
              required
            />
          </div>
          <div class="form-group">
            <textarea
              name="message"
              rows="6"
              placeholder="Your Message"
              required
            ></textarea>
          </div>
          <button type="submit" class="btn">Send Message</button>
        </form>
      </div>
    </section>

    <footer>
      <div class="footer-content">
        <p>&copy; 2026 cauilanjoaopaulo8@gmail.com. All rights reserved.</p>
        <div class="social-icons">
          <a href="#"><i class="fab fa-facebook-f"></i> Facebook</a>
          <a href="#"><i class="fab fa-instagram"></i> Instagram</a>
          <a href="#"><i class="fab fa-youtube"></i> YouTube</a>
        </div>
      </div>
    </footer>
  </body>
</html>
